<!DOCTYPE html>
<html>
<head>
    <title>Sistema NF-e</title>
    <link href="https://cdn.jsdelivr.met/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">Sistema NF-e </a>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif%}   
        
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
